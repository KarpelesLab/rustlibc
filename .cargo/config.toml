# Cross-linking without a full foreign GCC toolchain: use the LLVM linker that
# ships with rustup (`rust-lld`). The crate is freestanding (`-nodefaultlibs`),
# so the linker only needs to emit the object — no target libc/startup files
# required. This lets `cargo build --target aarch64-unknown-linux-gnu` produce
# the static/shared libs on an x86_64 host.
[target.aarch64-unknown-linux-gnu]
linker = "rust-lld"

[target.x86_64-unknown-linux-gnu]
# Host builds link normally through the system `cc`.
